name: Daily Job Agent Run

on:
  schedule:
    # Runs every day at 6:00 AM UTC (adjust to your timezone)
    # cron format: minute hour day month day-of-week
    - cron: "0 6 * * *"
  workflow_dispatch: {}   # lets you also trigger it manually from the Actions tab

permissions:
  contents: write   # needed so the workflow can commit the updated dashboard back

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run job agent
        env:
          EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
          EMAIL_APP_PASS: ${{ secrets.EMAIL_APP_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: python main.py

      - name: Commit updated dashboard
        run: |
          git config user.name "job-agent-bot"
          git config user.email "actions@github.com"
          git add docs/index.html docs/jobs.json
          git diff --cached --quiet || git commit -m "chore: daily job matches update"
          git push
